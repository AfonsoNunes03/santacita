        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: rgba(255, 255, 255, 0.6);

        }

            background: linear-gradient(135deg, #970012 0%, #C1121F 100%);
        }
    </style>

<body class="bg-surface font-body text-on-surface antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Header / Nav (Following TopNavBar logic but suppressed main links for focus) -->
<header class="fixed top-0 w-full z-50 glass-header">
<div class="flex justify-between items-center max-w-7xl mx-auto px-8 h-20">
<div class="text-2xl font-black tracking-tighter text-red-700 font-headline uppercase">
                PATHFINDER
            </div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-surface-container-low transition-all text-sm font-label font-bold uppercase tracking-tight text-zinc-600">
<span class="material-symbols-outlined text-lg" data-icon="language">language</span>
<span>PT</span>
<span class="material-symbols-outlined text-sm" data-icon="expand_more">expand_more</span>
</button>
</div>
</div>
</header>
<main class="min-h-screen flex items-center justify-center relative overflow-hidden px-4">
<!-- Background Topography Aesthetic -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-50">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-secondary-fixed/20 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary-fixed/30 blur-[100px]"></div>
</div>
<div class="w-full max-w-md z-10">
<!-- Login Card -->
<div class="bg-surface-container-lowest p-10 rounded-xl shadow-[0_8px_32px_0_rgba(0,0,0,0.04)]">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 trail-gradient rounded-xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="terrain" style="font-variation-settings: 'FILL' 1;">terrain</span>
</div>
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-background text-center">
                        Bem-vindo de volta
                    </h1>
<p class="text-zinc-500 font-label text-sm mt-2 uppercase tracking-widest font-medium">
                        Trilhos dos Templários
                    </p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-bold font-headline uppercase tracking-wider text-zinc-400 ml-1" for="email">
                            Email
                        </label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-on-surface placeholder:text-zinc-400" id="email" placeholder="atleta@pathfinder.pt" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-xs font-bold font-headline uppercase tracking-wider text-zinc-400" for="password">
                                Palavra-passe
                            </label>
<a class="text-[10px] font-bold uppercase tracking-tighter text-primary hover:text-primary-container transition-colors" href="#">Esqueceste-te?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-highest border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all font-body text-on-surface placeholder:text-zinc-400" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-14 trail-gradient text-on-primary font-headline font-bold uppercase tracking-widest rounded-lg shadow-lg shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer of Card -->
<div class="mt-10 pt-8 border-t border-surface-container text-center">
<p class="text-zinc-500 text-sm font-label">
                        Não tens conta? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Registar</a>
</p>
</div>
</div>
<!-- External Links -->
<div class="mt-8 flex justify-center gap-6">
<a class="text-zinc-400 text-[10px] font-headline uppercase tracking-[0.2em] hover:text-primary transition-colors" href="#">Termos de Serviço</a>
<span class="text-zinc-300">•</span>
<a class="text-zinc-400 text-[10px] font-headline uppercase tracking-[0.2em] hover:text-primary transition-colors" href="#">Privacidade</a>
</div>
</div>
</main>
<!-- Visual Anchor Image (Bleeding Edge Style) -->
<div class="fixed bottom-[-10%] right-[-5%] w-1/3 opacity-20 pointer-events-none hidden lg:block">
<img alt="" class="w-full h-auto grayscale contrast-125 mix-blend-multiply" data-alt="dramatic low angle shot of a trail runner's shoes hitting a rocky mountain path with dust particles in sunset light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVP1jqDk_ONAN81ov1tCSmav8KMRB-YSp6kunfd-zzI_lOZ71A6MZ-AyKQF-E8ZQfP8DHv5-ton3lavElO66IcwvJYbQQy6q03eZEWuj99c090niWbb2kto-2Gm14b-FZzXcA0FWh9n6mwhHV3JBv-UT5OTD4KBOs7RxFYD6Hmu2ZFiZIFmnJZ5Vx62QhfYYEA61M9mT0pWVXvAk-Cb0Y1GpAeLeh0Uwg1MPodpRaitAHUnFOrGEp0LYg0FAAQuBmQLJCIvQOO_tk1"/>
